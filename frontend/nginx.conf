server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # OWASP security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Proxy all /api/ requests to the backend service (internal network only)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow large video uploads (matches backend 500MB limit)
        client_max_body_size 512m;

        # Long timeouts — transcription + LLM analysis can take several minutes
        proxy_read_timeout 600s;
        proxy_send_timeout 120s;

        # Stream upload directly to backend without buffering in nginx
        proxy_request_buffering off;
    }

    # SPA fallback — serves index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
