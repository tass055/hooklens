services:

  # ── Ollama — local LLM runtime ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    expose:
      - "11434"
    networks:
      - hooklens_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    # GPU support — uncomment to enable NVIDIA GPU acceleration for Ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Ollama init — pulls model once, then exits ──────────────────────────
  # First run: downloads ~2GB model to the ollama_models volume.
  # Subsequent runs: model already in volume, completes in seconds.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - hooklens_net
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2:3b}"]
    restart: "no"

  # ── Backend — FastAPI + faster-whisper ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      # OLLAMA_HOST is always the internal service name in Docker — do not override in .env
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      # CORS: allow the nginx frontend (both with and without explicit :80 port)
      - ALLOWED_ORIGINS=http://localhost,http://localhost:${HOST_PORT:-80}
      # Whisper model cache — persisted in whisper_cache volume
      - HF_HOME=/cache/huggingface
    volumes:
      - whisper_cache:/cache
      - backend_outputs:/app/outputs
    expose:
      - "8000"
    networks:
      - hooklens_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Frontend — React built + nginx reverse proxy ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-80}:80"
    networks:
      - hooklens_net
    restart: unless-stopped


# ── Networks ────────────────────────────────────────────────────────────────
# hooklens_net: internal bridge network — backend and ollama are NOT exposed to host
networks:
  hooklens_net:
    driver: bridge


# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  ollama_models:    # LLM model files — survives container restarts
  whisper_cache:    # Whisper/HuggingFace model cache — avoids re-downloading
  backend_outputs:  # Generated .docx reports
